name: 🏷️ Auto Label

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, reopened]

# Permisos globales restrictivos (los jobs sobreescriben lo que necesiten)
permissions:
  contents: read

jobs:
  label-pr:
    name: Etiquetar PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 🏷️ Label por archivos cambiados
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  label-size:
    name: Etiquetar tamaño del PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 📏 Label por tamaño
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size: XS"
          xs_max_size: 10
          s_label: "size: S"
          s_max_size: 50
          m_label: "size: M"
          m_max_size: 150
          l_label: "size: L"
          l_max_size: 500
          xl_label: "size: XL"
          fail_if_xl: false

  label-issue:
    name: Etiquetar issue
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write
    steps:
      - name: 🤖 Label automático por contenido
        uses: github/issue-labeler@v3.4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/issue-labeler.yml
