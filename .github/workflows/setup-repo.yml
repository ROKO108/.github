name: 🚀 Setup nuevo repo
# checkov:skip=CKV_GHA_7: workflow administrativo requiere workflow_dispatch inputs
on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Nombre del repo a configurar"
        required: true
        type: string
      disable_linters:
        description: "Linters a desactivar. Ej: PYTHON_MYPY,PYTHON_PYRIGHT,SPELL_CSPELL"
        required: false
        type: string
        default: "PYTHON_MYPY,PYTHON_PYRIGHT,SPELL_CSPELL,REPOSITORY_GRYPE,REPOSITORY_CHECKOV,REPOSITORY_TRIVY"

permissions:
  contents: read

jobs:
  setup:
    name: ⚙️ Configurar repo
    runs-on: ubuntu-latest

    steps:
      - name: 🔧 Crear .github/workflows/ci.yml
        run: |
          CI_CONTENT=$(cat << 'EOF'
          name: 🛡️ CI

          on:
            push:
              branches: [main, master, develop]
            pull_request:
              branches: [main, master, develop]

          permissions:
            contents: write
            pull-requests: write
            issues: write
            statuses: write

          jobs:
            ci:
              uses: ROKO108/.github/.github/workflows/universal-ci.yml@main
              with:
                validate_all: false
                disable_linters: "DISABLE_LINTERS_PLACEHOLDER"
              secrets: inherit
          EOF
          )

          # Sustituye el placeholder con el valor del input
          CI_CONTENT="${CI_CONTENT//DISABLE_LINTERS_PLACEHOLDER/${{ inputs.disable_linters }}}"

          CONTENT=$(echo "$CI_CONTENT" | base64 -w 0)

          STATUS=$(gh api repos/ROKO108/${{ inputs.repo_name }}/contents/.github/workflows/ci.yml \
            --silent --include 2>&1 | head -1 | awk '{print $2}')

          if [ "$STATUS" = "200" ]; then
            echo "⚠️ ci.yml ya existe en ${{ inputs.repo_name }}, saltando..."
          else
            gh api repos/ROKO108/${{ inputs.repo_name }}/contents/.github/workflows/ci.yml \
              --method PUT \
              --field message="chore: setup CI automático" \
              --field content="$CONTENT"
            echo "✅ ci.yml creado en ${{ inputs.repo_name }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: 🌍 Generar .gitignore universal desde gitignore.io
        run: |
          curl -sL "https://www.toptal.com/developers/gitignore/api/python,node,javascript,typescript,java,kotlin,go,rust,php,ruby,swift,dart,c,c++,scala,r,terraform,docker,visualstudiocode,intellij,xcode,macos,windows,linux" \
            -o .gitignore_generated

          echo "" >> .gitignore_generated
          echo "# ── MegaLinter ────────────────────────────────────────────" >> .gitignore_generated
          echo "megalinter-reports/" >> .gitignore_generated
          echo "mega-linter.log" >> .gitignore_generated

          CONTENT=$(base64 -w 0 .gitignore_generated)

          STATUS=$(gh api repos/ROKO108/${{ inputs.repo_name }}/contents/.gitignore \
            --silent --include 2>&1 | head -1 | awk '{print $2}')

          if [ "$STATUS" = "200" ]; then
            echo "⚠️ .gitignore ya existe en ${{ inputs.repo_name }}, saltando..."
          else
            gh api repos/ROKO108/${{ inputs.repo_name }}/contents/.gitignore \
              --method PUT \
              --field message="chore: setup .gitignore universal" \
              --field content="$CONTENT"
            echo "✅ .gitignore creado en ${{ inputs.repo_name }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: 📋 Resumen
        run: |
          echo "## 🚀 Setup completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repo:** \`ROKO108/${{ inputs.repo_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Linters desactivados:** \`${{ inputs.disable_linters }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Archivos creados:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`.github/workflows/ci.yml\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`.gitignore\` (generado desde gitignore.io)" >> $GITHUB_STEP_SUMMARY
