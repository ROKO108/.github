name: 🐛 Bug Report
description: Algo no funciona como debería
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: ["ROKO108"]

body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar el bug. Cuanta más info des, más rápido lo arreglo. 🙏

  - type: textarea
    id: description
    attributes:
      label: 📝 Descripción del problema
      description: ¿Qué está pasando? ¿Qué esperabas que pasara?
      placeholder: "Cuando ejecuto X, ocurre Y en vez de Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔁 Pasos para reproducirlo
      description: Explica paso a paso cómo reproducir el bug
      placeholder: |
        1. Ejecutar `python script.py --flag`
        2. Introducir valor '...'
        3. Ver el error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Comportamiento esperado
      placeholder: "Debería haber..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📋 Logs / Traceback
      description: Pega aquí el error completo si lo tienes
      render: shell

  - type: dropdown
    id: python-version
    attributes:
      label: 🐍 Versión de Python
      options:
        - "3.13"
        - "3.12"
        - "3.11"
        - "3.10"
        - "3.9"
        - Otra (especifica en descripción)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 💻 Sistema operativo
      options:
        - Linux
        - macOS
        - Windows
        - Otro
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: ✔️ Checklist
      options:
        - label: He buscado en los issues existentes y no hay uno igual
          required: true
        - label: He leído la documentación
          required: false
