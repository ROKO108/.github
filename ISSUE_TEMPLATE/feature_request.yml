name: 🚀 Feature Request
description: Propón una nueva funcionalidad o mejora
title: "[FEAT] "
labels: ["enhancement", "needs-triage"]
assignees: ["ROKO108"]

body:
  - type: markdown
    attributes:
      value: |
        ¿Tienes una idea? Me interesa escucharla. 💡

  - type: textarea
    id: problem
    attributes:
      label: 🤔 ¿Qué problema resuelve?
      description: Explica el contexto. ¿Con qué te has encontrado?
      placeholder: "Me resulta frustrante cuando..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Solución propuesta
      description: ¿Cómo lo implementarías tú?
      placeholder: "Sería genial poder hacer X de forma Y..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternativas consideradas
      description: ¿Has probado otras formas de resolverlo?

  - type: dropdown
    id: priority
    attributes:
      label: 📊 Prioridad (desde tu punto de vista)
      options:
        - 🔥 Alta — lo necesito ya
        - 🟡 Media — sería muy útil
        - 🟢 Baja — nice to have
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: ✔️ Checklist
      options:
        - label: He buscado y no existe una feature igual ya pedida
          required: true
        - label: Estaría dispuesto/a a contribuir con un PR
          required: false
